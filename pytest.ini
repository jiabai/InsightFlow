[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = src/server
markers =
    unit: Unit tests that don't require external services
    integration: Integration tests that need real services
norecursedirs = .git .tox .venv node_modules
addopts =
    --ignore=tests/test_crawl4ai.py
    --ignore=tests/test_crawl4ai_llm.py
    --ignore=tests/test_fastmcp_metaso.py
    --ignore=tests/test_fastmcp_zhipuai.py
    --ignore=tests/test_litellm.py
    --ignore=tests/test_openai_interface.py
    --ignore=tests/test_pypdf2.py
    --ignore=tests/test_requests_metaso.py
    --ignore=tests/test_requests_openrouter.py
    --ignore=tests/test_requests_siliconflow.py
    --ignore=tests/test_requests_tools.py
    --ignore=tests/test_zai_chat_search.py
    --ignore=tests/test_zai_interface.py
    --ignore=tests/test_zai_websearch.py
    --ignore=tests/test_ai_sdk_generate_object.py
    --ignore=tests/test_ai_sdk_generate_text.py
